spring.application.name=regreen
server.port=8080
# Cau hinh PostgreSQL

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

supabase.url = https://vqbsqwmiuhdaaxelilra.supabase.co
supabase.service-key=${SERVICE_ROLE_KEY}
supabase.storage.bucket=regreen-knowledge

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Cau hinh Chatbot RAG
spring.ai.google.genai.vertex-ai=false
spring.ai.google.genai.embedding.vertex-ai=false
spring.ai.google.genai.embedding.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.embedding.project-id=${PROJECT_ID}
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.model=gemini-2.5-flash
spring.ai.google.genai.project-id=${PROJECT_ID}
spring.ai.model.embedding.text=google-genai
spring.ai.google.genai.embedding.text.model=gemini-embedding-001

spring.cache.type=caffeine

jwt.secret=${JWT_SECRET}

gemini.api.key=${GEMINI_API_KEY}